{% extends "base.html" %}
{% block content %}
<h2>Панель управления</h2>
<div class="row mt-4">
    <div class="col-md-4">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5 class="card-title">Места</h5>
                <p class="card-text display-4">{{ places_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5 class="card-title">На модерации</h5>
                <p class="card-text display-4">{{ pending_count }}</p>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-white bg-warning">
            <div class="card-body">
                <h5 class="card-title">Жалобы</h5>
                <p class="card-text display-4">{{ complaints_count }}</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
